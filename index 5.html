<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

  <!-- Template  : Scholar - Online School HTML5 Template  -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg tm-navbar sticky-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">Buat<span>Kamu</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#tmNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="tmNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html#tm-services">Layanan</a></li>
          <li class="nav-item"><a class="nav-link" href="../index.html#tm-courses">Mapel</a></li>
          <li class="nav-item"><a class="nav-link" href="../index.html#tm-team">Tutor</a></li>
          <li class="nav-item"><a class="nav-link" href="../index.html#tm-events">Jadwal</a></li>
          <li class="nav-item"><a class="nav-link" href="../index.html#tm-contact">Kontak</a></li>
        </ul>
        <a href="../login/index.html" class="nav-cta-btn ms-2">Login</a>
      </div>
    </div>
  </nav>

  <!-- HERO kecil -->
  <section class="login-hero">
    <div class="container text-center">
      <h6>Bergabung Sekarang</h6>
      <h2>Daftar ke <span>Buat Kamu</span></h2>
      <p>Buat akun gratis dan mulai belajar TKA hari ini juga.</p>
    </div>
  </section>

  <!-- FORM REGISTER -->
  <section class="login-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

          <div class="login-card">
            <div class="login-card-header">
              <i class="fas fa-user-plus"></i>
              <h4>Buat Akun Baru</h4>
            </div>

            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-user"></i></span>
                  <input type="text" class="form-control" id="username" placeholder="Buat username" required />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                  <input type="email" class="form-control" id="email" placeholder="email@kamu.com" required />
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-lock"></i></span>
                  <input type="password" class="form-control" id="password" placeholder="Buat password" required />
                  <button class="input-group-text toggle-pass" type="button" id="togglePass">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                  </button>
                </div>
              </div>

              <button type="submit" class="btn-login">
                <span id="btnText">Daftar Sekarang</span>
                <span id="btnSpinner" style="display:none">
                  <i class="fas fa-spinner fa-spin"></i> Memproses...
                </span>
              </button>

              <div id="message" class="mt-3 text-center" style="font-size:0.88rem;font-weight:700;color:#0077B6"></div>
            </form>

            <div class="login-footer">
              Sudah punya akun? <a href="../login/index.html">Login di sini</a>
            </div>
          </div>

          <div class="text-center mt-3">
            <a href="../index.html" class="back-link">
              <i class="fas fa-arrow-left"></i> Kembali ke Beranda
            </a>
          </div>

        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="login-page-footer">
    <div class="container text-center">
      <p>
        Copyright &copy; 2025 Buat Kamu &nbsp;|&nbsp;
        Design: <a href="https://templatemo.com/tm-586-scholar" target="_blank" rel="noopener">Scholar &ndash; TemplateMo</a>
      </p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Toggle show/hide password -->
  <script>
    document.getElementById('togglePass').addEventListener('click', function () {
      const pass = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pass.type === 'password') {
        pass.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        pass.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    // Spinner saat submit
    document.getElementById('registerForm').addEventListener('submit', function () {
      document.getElementById('btnText').style.display    = 'none';
      document.getElementById('btnSpinner').style.display = 'inline';
    });
  </script>

  <!-- Logic register dari bapak — tidak diubah -->
  <script src="register.js"></script>

</body>
</html>
